<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bayo, Web Developer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <header>
        <a href="/">
            <img src="Assets/icons/logo.png" alt="Bayor, Website Logo" class="logo">
        </a>
        <nav>
            <svg class="hamburger" xmlns="http://www.w3.org/2000/svg" width="26" height="19" viewBox="0 0 26 19" fill="none">
                <path d="M1 17.6667H24.3333M1 9.33333H24.3333M1 1H24.3333" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <div class="nav_links">
                <a href="" class="nav_link">Portfolio</a>
                <a href="" class="nav_link">About</a>
                <a href="" class="nav_link">Contact</a>
            </div>
        </nav>
    </header>
    <main>
        <section class="hero">
            <div class="hero_text">
                <h2 class="hero_title">Hello, <br> I'm Lekan</h2>
                <p class="hero_sub"><span class="text_clip">A Front-end</span> Website Developer</p>
                <div class="btn_wrapper" id="large_screen">
                    <a href="" class="hero_cta primary">Hire Me</a>
                    <a href="" class="hero_cta secondary ">Download CV</a>
                </div>
            </div>
            <div class="hero_avatar-n-sos">
                <div class="avatar_backdrop">
                <div class="avatar_wrapper">
                    <img src="Assets/images/Avatar.png" alt="" class="avatar">
                </div>
                </div>
                <div class="floating_sos">
                    <a href="www.github.com/adebayorr" class="sos">
                        <img src="Assets/icons/github.png" alt="" class="sos_icon">
                    </a>
                    <a href="www.linkedin.com" class="sos">
                        <img src="Assets/icons/linkedin.png" alt="" class="sos_icon">
                    </a>
                    <a href="www.twitter.com" class="sos">
                        <img src="Assets/icons/twitter.png" alt="" class="sos_icon">
                    </a>
                </div>
            </div>
            <div class="btn_wrapper" id="mobile">
                <a href="" class="hero_cta primary">Hire Me</a>
                <a href="" class="hero_cta secondary ">Download CV</a>
            </div>
        </section>
    </main>
</body>
</html>
